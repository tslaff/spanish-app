id: food
name: "Food & drink"

cards:
  - front: "el agua"
    back: "water"
    notes: "Feminine noun, but takes 'el' in the singular."
  - front: "el pan"
    back: "bread"
  - front: "la manzana"
    back: "apple"
  - front: "el queso"
    back: "cheese"
  - front: "la cerveza"
    back: "beer"
  - front: "el café"
    back: "coffee"
  - front: "tener hambre"
    back: "to be hungry"
    notes: "Literally 'to have hunger'."

sentences:
  - es: "Quiero un café con leche, por favor."
    en: "I want a coffee with milk, please."
  - es: "¿Tienes hambre? Hay pan y queso."
    en: "Are you hungry? There is bread and cheese."
  - es: "El agua está muy fría."
    en: "The water is very cold."
