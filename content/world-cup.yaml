sentences:
  - es: "España juega su primer partido del Mundial mañana."
    en: "Spain plays its first World Cup match tomorrow."

  - es: "La selección tiene muchos jugadores jóvenes."
    en: "The national team has many young players."

  - es: "El delantero marcó dos goles en la victoria."
    en: "The striker scored two goals in the victory."

  - es: "El portero hizo una parada increíble."
    en: "The goalkeeper made an incredible save."

  - es: "Empatamos uno a uno después de noventa minutos."
    en: "We drew one-one after ninety minutes."

  - es: "El árbitro mostró una tarjeta roja."
    en: "The referee showed a red card."

  - es: "Nuestro equipo necesita ganar para clasificarse."
    en: "Our team needs to win to qualify."

  - es: "La afición animó al equipo durante todo el partido."
    en: "The fans cheered on the team throughout the match."

  - es: "Brasil dominó el partido desde el principio."
    en: "Brazil dominated the match from the beginning."

  - es: "La final se jugará en un estadio muy grande."
    en: "The final will be played in a very large stadium."

  - es: "El entrenador cambió la alineación antes del partido."
    en: "The coach changed the lineup before the match."

  - es: "Tuvimos más posesión, pero perdimos el partido."
    en: "We had more possession, but we lost the match."

  - es: "El defensa cometió una falta cerca del área."
    en: "The defender committed a foul near the penalty area."

  - es: "Ganaron en la tanda de penaltis."
    en: "They won in the penalty shootout."

  - es: "El equipo quedó eliminado en los cuartos de final."
    en: "The team was eliminated in the quarterfinals."

  - es: "Argentina es una de las favoritas para ganar el trofeo."
    en: "Argentina is one of the favorites to win the trophy."

  - es: "Hubo varias ocasiones claras de gol."
    en: "There were several clear scoring chances."

  - es: "El centrocampista dio un pase perfecto."
    en: "The midfielder gave a perfect pass."

  - es: "El jugador estaba en fuera de juego."
    en: "The player was offside."

  - es: "La rivalidad entre estos dos países es muy conocida."
    en: "The rivalry between these two countries is very well known."

  - es: "Después del empate, ambos equipos siguen con opciones de clasificarse."
    en: "After the draw, both teams still have a chance to qualify."

  - es: "Marruecos dio la sorpresa al vencer a un rival más fuerte."
    en: "Morocco caused an upset by beating a stronger opponent."

  - es: "La selección ha mejorado mucho en los últimos años."
    en: "The national team has improved a lot in recent years."

  - es: "El capitán levantó el trofeo delante de miles de aficionados."
    en: "The captain lifted the trophy in front of thousands of fans."

  - es: "Si ganamos este partido, pasaremos a los octavos de final."
    en: "If we win this match, we will advance to the round of 16."

  - es: "¿Quién crees que ganará la Copa del Mundo este año?"
    en: "Who do you think will win the World Cup this year?"