sentences:
  - es: "Nuestra startup está creciendo muy rápido este año."
    en: "Our startup is growing very quickly this year."

  - es: "Mi cofundador se encarga del producto y yo del marketing."
    en: "My co-founder is responsible for the product and I handle marketing."

  - es: "Estamos buscando inversores para la próxima ronda de financiación."
    en: "We are looking for investors for the next funding round."

  - es: "La empresa recaudó fondos el año pasado."
    en: "The company raised money last year."

  - es: "Tenemos más de cien clientes activos."
    en: "We have more than one hundred active customers."

  - es: "Queremos lanzar una nueva función el mes que viene."
    en: "We want to launch a new feature next month."

  - es: "El equipo analiza los datos cada semana."
    en: "The team analyzes the data every week."

  - es: "Necesitamos medir el rendimiento de la campaña."
    en: "We need to measure the campaign's performance."

  - es: "Este anuncio tuvo muchas impresiones y clics."
    en: "This ad had many impressions and clicks."

  - es: "La tasa de conversión mejoró después de los cambios."
    en: "The conversion rate improved after the changes."

  - es: "El panel de control muestra las métricas más importantes."
    en: "The dashboard shows the most important metrics."

  - es: "Estamos desarrollando una herramienta de inteligencia artificial."
    en: "We are developing an artificial intelligence tool."

  - es: "Nuestro modelo analiza vídeos automáticamente."
    en: "Our model analyzes videos automatically."

  - es: "La plataforma puede detectar objetos en tiempo real."
    en: "The platform can detect objects in real time."

  - es: "Identificamos una oportunidad importante en el mercado."
    en: "We identified an important opportunity in the market."

  - es: "La competencia está lanzando productos similares."
    en: "The competition is launching similar products."

  - es: "Ayer tuvimos una reunión con un posible cliente."
    en: "Yesterday we had a meeting with a potential customer."

  - es: "Les presentamos una propuesta la semana pasada."
    en: "We presented them with a proposal last week."

  - es: "Esperamos cerrar el acuerdo este mes."
    en: "We hope to close the deal this month."

  - es: "Estamos negociando las condiciones del contrato."
    en: "We are negotiating the contract terms."

  - es: "El creador de contenido publicó un vídeo sobre nuestro producto."
    en: "The content creator published a video about our product."

  - es: "La audiencia respondió muy bien a la campaña."
    en: "The audience responded very well to the campaign."

  - es: "Los ingresos aumentaron un veinte por ciento."
    en: "Revenue increased by twenty percent."

  - es: "Queremos automatizar más procesos internos."
    en: "We want to automate more internal processes."

  - es: "Nuestro objetivo es crecer en el mercado europeo."
    en: "Our goal is to grow in the European market."

  - es: "Los inversores hicieron muchas preguntas sobre el producto."
    en: "The investors asked many questions about the product."

  - es: "El informe muestra que las ventas han aumentado."
    en: "The report shows that sales have increased."

  - es: "Estamos siguiendo varias métricas para entender el negocio."
    en: "We are tracking several metrics to understand the business."

  - es: "El cliente pidió una demostración de la plataforma."
    en: "The client requested a demonstration of the platform."

  - es: "Necesitamos convencer a más empresas para que prueben el producto."
    en: "We need to convince more companies to try the product."