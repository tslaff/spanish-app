{% if card %}
<div class="counter muted">{{ remaining }} due</div>
<div class="card">
  <div class="front">{{ card.prompt }}</div>
  <input id="attempt" class="attempt-input" type="text" autofocus
         autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
         placeholder="Type the translation…"
         hx-post="/review/{{ deck.id }}/check"
         hx-trigger="keyup[key=='Enter']"
         hx-vals='js:{card_id: "{{ card.id }}", attempt: document.getElementById("attempt").value}'
         hx-target="#review-area" hx-swap="innerHTML">
</div>

<div class="controls">
  <button class="primary"
          hx-post="/review/{{ deck.id }}/check"
          hx-vals='js:{card_id: "{{ card.id }}", attempt: document.getElementById("attempt").value}'
          hx-target="#review-area" hx-swap="innerHTML">Check</button>
  <button class="ghost"
          hx-post="/review/{{ deck.id }}/check"
          hx-vals='{"card_id": "{{ card.id }}", "attempt": "", "reveal": "1"}'
          hx-target="#review-area" hx-swap="innerHTML">Show answer</button>
</div>
{% else %}
<div class="done">
  <p>All caught up here. Nothing more due right now.</p>
  <a class="primary" href="/">Back to lessons</a>
</div>
{% endif %}
