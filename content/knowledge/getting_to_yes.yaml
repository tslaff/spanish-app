id: getting_to_yes
name: "Getting to Yes"

cards:
  - front: |
      Separate the people from the problem.
      Treat relationship issues independently from the substance of the negotiation — attacking the problem together works far better than attacking each other.
    back: |
      Every negotiation involves two dimensions: the people in the room and the problem on the table, and confusing the two is one of the most common causes of failure. When someone feels personally attacked, they stop thinking about solutions and start defending their identity. Fisher and Ury argue that you can be completely firm on the merits of an issue while being genuinely respectful and even generous toward the person across from you. Separating these two dimensions allows both sides to stand side by side against the problem, rather than facing off against each other.

  - front: |
      Focus on interests, not positions.
      Behind every stated demand lies a deeper motivation; understanding why someone wants something opens far more solutions than debating what they're asking for.
    back: |
      A position is what someone says they want; an interest is why they want it. Two neighbours arguing over a fence line are in a positional dispute, but their underlying interests — privacy, light, aesthetics — may be easily reconciled once surfaced. When you negotiate at the level of positions, you are fighting over a fixed pie; when you negotiate at the level of interests, you often discover the pie is larger than it appeared. The authors illustrate this with the famous story of two people arguing over an orange, only to discover one wanted the juice and the other the peel — a perfect split that positional bargaining would never have found.

  - front: |
      Ask "why" and "why not."
      Probing the reasoning behind a position — including your own — is the fastest way to surface the real interests driving the negotiation.
    back: |
      "Why" is the question that moves a negotiation from the surface to the substance. When you ask why someone holds a position, you force both of you to articulate the interests and reasoning underneath it. "Why not?" is equally powerful — asking what concerns prevent them from accepting your proposal reveals the obstacles you actually need to address. Fisher and Ury recommend putting yourself in the other side's shoes and working through their objections in advance, so you can speak directly to what genuinely matters to them rather than what you assume does.

  - front: |
      Invent options for mutual gain.
      Before choosing, generate a wide range of possible agreements; the best deals expand the pie rather than just divide it.
    back: |
      Most negotiators move too quickly toward a single solution, treating the first acceptable option as the destination. Fisher and Ury argue for a deliberate creative phase — separated entirely from evaluation — in which both sides brainstorm freely without commitment or criticism. The goal is to multiply options, not to narrow them prematurely. Agreements that feel like wins for both sides are usually built from options that neither party would have considered in the heat of positional bargaining. This requires intellectual generosity: being willing to think about what would actually work for the other side, not just for yourself.

  - front: |
      Don't mistake your position for your interest.
      Locking onto a specific demand can blind you to other outcomes that would satisfy your actual needs just as well or better.
    back: |
      It is surprisingly easy to become so attached to a stated demand that you lose sight of the underlying goal it was meant to serve. A salary negotiation anchored to a specific number, for example, might be missing the real interest — financial security, recognition, or flexibility — that could be met in entirely different ways. Fisher and Ury point out that the more loudly and publicly you state a position, the more your ego becomes invested in it, making it even harder to shift. Constantly asking yourself "what am I actually trying to achieve here?" keeps you focused on what matters and adaptable on everything else.

  - front: |
      Dovetail differing interests.
      When two parties want different things — one values certainty, another flexibility — those differences become the raw material for creative agreement.
    back: |
      It is a common but mistaken assumption that differences between parties are what make negotiation hard. In fact, Fisher and Ury argue that differences are often the very source of value in a deal. If one party is risk-averse and the other is a risk-taker, a deal can be structured so that the cautious party bears less risk and the bold party accepts more in exchange for a larger potential upside. Differences in time horizons, priorities, beliefs, and preferences all create opportunities to trade in ways that make both parties better off. The skill lies in mapping those differences carefully enough to see where they fit together.

  - front: |
      Look for shared interests.
      Common ground almost always exists beneath apparent conflict; making it explicit builds momentum and goodwill.
    back: |
      Even in the most adversarial negotiations, the parties typically share a number of interests — a desire for a durable agreement, a preference for speed, an interest in maintaining a working relationship, or a shared concern about outside threats. Fisher and Ury recommend actively searching for these and naming them early, because doing so reframes the conversation as collaborative rather than combative. Shared interests also provide an anchor when talks get difficult: returning to what both sides agree on can break deadlocks and rebuild trust. The mistake most negotiators make is focusing exclusively on what divides them, which makes the gap feel larger than it is.

  - front: |
      Insist on objective criteria.
      Ground proposals in external standards — market value, precedent, legal principle, expert opinion — so that neither side feels they are simply capitulating to the other's will.
    back: |
      When a negotiation is decided purely by willpower or stubbornness, one party always feels defeated, which corrodes both the agreement and the relationship. Objective criteria shift the contest from "who can hold out longer" to "what does a fair outcome actually look like." This might mean referring to comparable sales, industry standards, scientific findings, or what a court would likely decide. The authors emphasise that the criteria must be independent of either party's will — something both can point to as external and legitimate. Insisting on this standard is not a sign of weakness; it is a principled and often highly persuasive move.

  - front: |
      Legitimacy cuts both ways.
      If a standard is fair enough to use against you, it is fair enough to use in your favour — don't abandon criteria just because they help you.
    back: |
      A common negotiating trap is to feel embarrassed about citing a standard that clearly benefits your position, as if doing so were self-serving. But Fisher and Ury point out that legitimacy is a two-way street: if a precedent, market rate, or expert consensus is a fair reference point, it applies regardless of which party it favours. You can confidently ask, "If this standard is fair, would you be willing to apply it here?" The other side cannot accept the principle and reject its implications without appearing inconsistent. This gives you a powerful, non-aggressive form of leverage rooted entirely in reason rather than force.

  - front: |
      Know your BATNA.
      Your Best Alternative to a Negotiated Agreement is your true source of power; you should never accept a deal worse than what you can achieve without one.
    back: |
      The BATNA is one of the most important concepts in the entire book. It is not your bottom line — it is the best outcome you can achieve if this particular negotiation fails. Knowing it clearly prevents you from accepting a bad deal out of desperation, and it prevents you from walking away from a good one out of stubbornness. Fisher and Ury argue that the relative strength of each party's BATNA, more than any positional maneuvering, determines who has genuine leverage in a negotiation. If you do not know your BATNA going in, you are negotiating blind.

  - front: |
      Develop your BATNA actively.
      The stronger your alternative outside the negotiation, the more confidently — and honestly — you can walk away from a bad deal.
    back: |
      Many negotiators treat their BATNA as fixed — something they discover rather than build. Fisher and Ury argue that improving your alternatives before and during a negotiation is one of the most powerful things you can do. If you are buying a house, cultivating other offers strengthens your hand dramatically. If you are in a job negotiation, having a competing offer transforms your position. The more effort you invest in developing strong outside options, the more leverage you carry into the room — not through bluffing or aggression, but through the simple reality that you do not need this deal as badly as the other side might assume.

  - front: |
      Know their BATNA too.
      Understanding what the other side can fall back on tells you how much leverage you actually have and prevents you from demanding less than you could.
    back: |
      It is not enough to understand your own alternatives — you need a realistic picture of theirs. If the other party has a strong BATNA, you know they have genuine walk-away power and you will need to offer something genuinely attractive to reach agreement. If their alternatives are weak, you understand that the pressure to settle falls more heavily on them, and you can negotiate accordingly without feeling guilty about it. Fisher and Ury recommend researching the other side's alternatives as carefully as you research the substance of the deal itself. Many negotiators concede far too much because they overestimate how comfortable the other side would be with no agreement.

  - front: |
      Don't set a bottom line.
      A rigid floor stops creative thinking and makes you inflexible in ways that can cost you good deals.
    back: |
      A bottom line is meant to protect you from a bad deal, but it does so clumsily. It is usually set in advance, based on imperfect information, and it prevents you from updating your thinking as the negotiation develops. More importantly, it cuts off exploration — once you have decided you will never go below a certain point, you stop looking for creative solutions that might make that threshold irrelevant. Fisher and Ury argue that a well-understood BATNA serves the same protective function as a bottom line but without the rigidity. Instead of a hard floor, you carry a clear picture of your alternatives, and you use that picture to evaluate options dynamically as they emerge.

  - front: |
      Positional bargaining is inefficient.
      Haggling over stated positions wastes time, generates resentment, and frequently produces poor outcomes for both sides.
    back: |
      When both parties open with extreme positions and make grudging, incremental concessions, enormous amounts of time and energy are consumed in a process that is essentially theatrical. Each move is calculated not to reveal information but to protect leverage, which means both parties remain largely ignorant of each other's real interests throughout. Agreements reached this way tend to leave value on the table because neither side had the information or the creative space to find a better deal. Fisher and Ury show that this is not just an aesthetic problem — it is an economic one. Principled negotiation consistently produces better outcomes in less time.

  - front: |
      Positional bargaining damages relationships.
      Even when a deal is reached through positional combat, the adversarial dynamic leaves lasting harm to trust and future cooperation.
    back: |
      Every concession in a positional negotiation feels like a defeat, and people remember that feeling long after the deal is signed. If you are negotiating with someone you will work with again — a colleague, a supplier, a neighbour — the bitterness generated by a win-lose dynamic poisons the relationship and makes future interactions harder. Fisher and Ury point out that deals reached through principled negotiation tend to be more durable, because both parties feel the outcome was legitimate rather than forced upon them. The relationship itself is treated as a resource worth preserving, not a battlefield to be won.

  - front: |
      Be soft on people, hard on the problem.
      Firmness about substance and generosity toward the person are not opposites — the best negotiators practice both simultaneously.
    back: |
      Many people assume that being tough in a negotiation means being cold or aggressive toward the other party, and that being warm means making concessions. Fisher and Ury dismantle this assumption entirely. You can hold your ground completely on the merits while being respectful, curious, and even friendly toward the person across the table. In fact, this combination is far more effective than toughness alone — it disarms defensiveness without signalling weakness. The goal is to make the other person feel that you respect them personally and that you are attacking the problem, not them.

  - front: |
      Acknowledge emotions explicitly.
      Naming feelings — yours and theirs — defuses tension and signals respect, making it easier to engage with the actual issues.
    back: |
      Emotions are not an obstacle to negotiation — they are part of it, and pretending otherwise makes them harder to manage. Fisher and Ury recommend acknowledging the emotional dimension directly: "I can see this is really frustrating for you" or "I want to be honest that I'm feeling some pressure here." This kind of acknowledgment costs nothing and often produces an immediate reduction in tension. When people feel that their emotions have been seen and respected, they are far more willing to shift their attention from defending their feelings to solving the problem. Suppressed emotions, by contrast, tend to resurface as positional rigidity or personal attacks.

  - front: |
      Let the other side vent.
      Allowing someone to express frustration without reacting reduces its power and often clears the path to a rational conversation.
    back: |
      When someone is emotionally activated, logic has limited reach. Fisher and Ury counsel patience: let the other party say what they need to say, without interrupting or defending yourself, and the outburst typically runs its natural course. Reacting — especially by reciprocating with your own grievances — escalates and prolongs the emotional phase. Listening without reacting is not the same as agreeing; it simply signals that you are secure enough not to be destabilised, which in itself is a form of quiet authority. Once the emotional pressure is released, the conversation can return to substance on far more solid footing.

  - front: |
      Don't react — reframe.
      When attacked personally, redirect the energy toward the problem; treating their aggression as information rather than an offence keeps the negotiation alive.
    back: |
      Personal attacks in a negotiation are almost always a sign that the other party has moved into positional mode and feels threatened or frustrated. The worst response is to match the energy — it validates the frame and turns the negotiation into a conflict between people rather than a shared effort to solve a problem. Fisher and Ury recommend stepping to the side: instead of pushing back, ask a question, request clarification, or name what is happening without judgment. "It sounds like you feel this arrangement has been unfair to you — can you help me understand what a fair outcome looks like from your side?" This reframes the attack as a data point about their interests rather than a personal challenge.

  - front: |
      Negotiation jujitsu.
      Instead of pushing back against a strong position, step to the side — ask for their reasoning, probe their assumptions, and invite them to critique your thinking.
    back: |
      Negotiation jujitsu is Fisher and Ury's martial arts metaphor for the art of deflecting force rather than absorbing it. When the other side asserts a strong position, the instinctive response is to push back — which simply increases the pressure. The jujitsu move is to neither accept nor reject the position, but to redirect the conversation toward reasoning. Ask how they arrived at that figure. Ask what concerns they have about your proposal. Invite them to find the flaw in your argument. This puts the substance back on the table without threatening their ego, and it frequently surfaces the interests and constraints you need to understand in order to find a real solution.

  - front: |
      Ask for their reasoning, not their concessions.
      Inviting the other side to explain their logic is less confrontational than demanding movement and often reveals flexibility they didn't announce.
    back: |
      Demanding concessions puts the other party in a defensive posture — they feel they are losing ground, which triggers resistance. Asking for reasoning, on the other hand, is an invitation to collaborate. It signals that you are trying to understand rather than defeat, which lowers the temperature and opens up the conversation. Very often, when people are asked to explain the logic behind a position, they discover — or reveal — that it is less firm than they initially presented it. Questions like "Help me understand how you arrived at that" or "What would need to be true for a different arrangement to work?" are far more productive than any amount of counter-positioning.

  - front: |
      Make your proposals consistent with their values.
      Framing an offer in terms of what the other side says it cares about makes acceptance far easier and rejection harder to justify.
    back: |
      People find it very difficult to reject a proposal that is framed in their own stated terms. If the other party has emphasised fairness, present your offer as the fair one and show why. If they have stressed precedent, demonstrate that your proposal is consistent with it. This is not manipulation — it is the application of legitimate criteria that the other side has already endorsed. Fisher and Ury encourage negotiators to listen carefully to the language and values the other party invokes, because those are the standards against which any proposal will ultimately be judged. Aligning your offer with their expressed values transforms it from something they have to accept into something they can genuinely own.

  - front: |
      Recognize and counter dirty tricks.
      Deceptive tactics lose their power the moment you name them calmly and invite a return to principled negotiation.
    back: |
      Hard bargainers sometimes resort to tactics designed to create pressure, confusion, or a false sense of urgency — extreme anchors, good cop/bad cop routines, fake deadlines, or deliberate misrepresentation of facts. Fisher and Ury argue that the most effective response is not to retaliate in kind but to name the tactic explicitly and calmly. "It seems like we're getting a lot of pressure around this deadline — can you help me understand where that's coming from?" This move is disarming precisely because it is non-aggressive: it exposes the tactic without attacking the person, and it signals that you will not be moved by manipulation, only by reason.

  - front: |
      Never accept an ultimatum at face value.
      Ultimatums are usually positional moves, not final realities — acknowledging them without reacting keeps room for a principled solution.
    back: |
      "Take it or leave it" is one of the most common pressure tactics in negotiation, and one of the least reliable indicators of someone's actual limits. Fisher and Ury counsel against either caving immediately or escalating in response. Instead, treat the ultimatum as information — it tells you that the other party feels strongly, perhaps that they feel backed into a corner — and respond by acknowledging it while keeping the conversation open. "I hear that this feels like your final position — I'd like to take a moment to see if there's anything we haven't yet considered." This avoids the ego trap of making the ultimatum a test of wills, while preserving the negotiation itself.

  - front: |
      Use a one-text procedure for complex talks.
      When direct negotiation stalls, a neutral draft that both sides critique — rather than defend — progressively moves toward agreement without ego getting in the way.
    back: |
      The one-text procedure was developed partly out of the Camp David negotiations and involves a third party (or one of the negotiators) creating a single working draft that neither side owns. Instead of each party defending their own proposal, both are invited to criticise and improve the same document. This sidesteps the ego investment that accumulates around positions and proposals people have authored. Each round of feedback makes the draft better and more acceptable to both sides, until a version emerges that both can live with. It is particularly useful when direct communication has broken down or when both parties are too entrenched to make visible concessions.

  - front: |
      Four problems, four principles.
      Almost every negotiation difficulty traces back to people, interests, options, or criteria — diagnosing which problem you're facing points directly to the right remedy.
    back: |
      Fisher and Ury structure their entire framework around four core elements: the people involved, the interests at stake, the options available, and the criteria used to evaluate them. When a negotiation is going badly, the fault almost always lies in one of these four areas — an interpersonal dynamic that is damaging trust, a failure to understand underlying interests, a shortage of creative options, or a disagreement about what counts as fair. This diagnostic framework is one of the most practically useful things in the book because it tells you not just what to do in general, but what to do right now, based on where the actual problem lies.

  - front: |
      Power is not the only lever.
      Even a weaker party can negotiate effectively by developing alternatives, appealing to objective standards, and building a compelling case on the merits.
    back: |
      Many people assume that negotiating power comes primarily from resources, authority, or leverage — and feel helpless when they have less of these than the other side. Fisher and Ury challenge this assumption directly. A weaker party who knows their BATNA, argues from objective criteria, and understands the other side's interests can often achieve better outcomes than a powerful party who relies purely on pressure. Principled negotiation is in some ways specifically designed for those without conventional power — it replaces force with reason, and reason can be applied by anyone. The authors also note that even the most powerful party has an interest in reaching a durable agreement, which gives the weaker party more influence than it might initially appear.

  - front: |
      Agreement on process before substance.
      Explicitly negotiating how you will negotiate — ground rules, tone, sequence — prevents procedural disputes from derailing the real discussion.
    back: |
      Before diving into the substance of a negotiation, it is often worth spending a few minutes agreeing on the process: how will information be shared, in what order will issues be addressed, how will decisions be recorded? This meta-negotiation is easy to skip and frequently costly to have skipped. Disputes about process — who speaks first, whether something is off the record, what agenda item comes next — can consume enormous amounts of time and generate real acrimony if they arise spontaneously mid-negotiation. Resolving them in advance, when stakes are lower and goodwill is higher, clears the path for the substantive conversation that actually matters.

  - front: |
      Commitment to principle is not rigidity.
      Being firm about using fair criteria and focusing on interests is categorically different from stubbornly defending a position.
    back: |
      Critics of principled negotiation sometimes argue that it is naively soft — that in the real world, you have to fight for your position. Fisher and Ury make an important distinction in response: there is nothing soft about insisting that the negotiation be conducted on the basis of interests, objective criteria, and mutual gain. That commitment can be held with complete firmness. What is soft — and appropriately so — is the treatment of the other party as a person, and the flexibility about how your interests are met. Being immovable on a specific outcome is rigidity; being immovable on the principle that outcomes should be fair is something else entirely.

  - front: |
      The goal is a wise agreement, not a win.
      A truly successful negotiation produces an outcome that meets both sides' legitimate interests, is durable, and preserves — or improves — the relationship.
    back: |
      Fisher and Ury define a "wise agreement" with precision: it meets the legitimate interests of both parties as well as possible, resolves conflicting interests fairly, is durable, and takes community interests into account. This is a higher standard than simply "getting what you wanted," and it reframes what success in negotiation actually looks like. A deal that leaves the other side feeling cheated may technically be a win, but it invites renegotiation, breeds resentment, and damages future cooperation. The authors argue that the best negotiators are not those who extract the most from the other side, but those who consistently create agreements that both parties are genuinely glad to have reached.
