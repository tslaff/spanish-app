{% if item %}
<div class="counter muted">{{ remaining }} due</div>
<div class="card">
  <div class="front">{{ item.prompt }}</div>
  <textarea id="attempt" rows="2" autofocus
            placeholder="Type your translation…"></textarea>
</div>

<div class="controls">
  <button class="primary"
          hx-post="/sentences/{{ deck.id }}/check"
          hx-vals='js:{item_id: "{{ item.id }}", attempt: document.getElementById("attempt").value}'
          hx-target="#sentence-area" hx-swap="innerHTML">Check</button>
  <button class="ghost"
          hx-post="/sentences/{{ deck.id }}/check"
          hx-vals='{"item_id": "{{ item.id }}", "attempt": "", "reveal": "1"}'
          hx-target="#sentence-area" hx-swap="innerHTML">Show answer</button>
</div>
{% else %}
<div class="done">
  <p>No sentences due right now.</p>
  <a class="primary" href="/">Back to lessons</a>
</div>
{% endif %}
