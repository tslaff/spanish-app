sentences:
  # SER = identity, characteristics, profession, origin

  - es: "Mi abuelo era médico."
    en: "My grandfather was a doctor."

  - es: "Cuando era niño, era muy tímido."
    en: "When I was a child, I was very shy."

  - es: "La reunión fue muy interesante."
    en: "The meeting was very interesting."

  - es: "La conferencia fue en Barcelona."
    en: "The conference was in Barcelona."

  - es: "Mi cofundadora es de Valencia."
    en: "My co-founder is from Valencia."

  - es: "El proyecto ha sido un éxito."
    en: "The project has been a success."

  - es: "Las instrucciones eran difíciles de entender."
    en: "The instructions were difficult to understand."

  - es: "La fiesta fue increíble."
    en: "The party was incredible."

  # ESTAR = state, condition, location

  - es: "Estoy muy cansado después del viaje."
    en: "I am very tired after the trip."

  - es: "Ayer estuve en Madrid todo el día."
    en: "Yesterday I was in Madrid all day."

  - es: "Cuando llegaste, estaba hablando con mi jefe."
    en: "When you arrived, I was talking with my boss."

  - es: "Esta semana hemos estado muy ocupados."
    en: "We have been very busy this week."

  - es: "Los inversores estaban nerviosos antes de la presentación."
    en: "The investors were nervous before the presentation."

  - es: "La oficina está cerca de la estación."
    en: "The office is near the station."

  - es: "El restaurante estaba cerrado."
    en: "The restaurant was closed."

  - es: "Hoy estoy mucho más tranquilo."
    en: "Today I am much calmer."

  # Contrastes clásicos

  - es: "El hotel era antiguo, pero estaba limpio."
    en: "The hotel was old, but it was clean."

  - es: "La película fue larga, pero yo estaba entretenido."
    en: "The movie was long, but I was entertained."

  - es: "Mi profesor era muy estricto, pero siempre estaba dispuesto a ayudar."
    en: "My teacher was very strict, but he was always willing to help."

  - es: "La reunión fue corta porque todos estaban preparados."
    en: "The meeting was short because everyone was prepared."

  - es: "Cuando vivía en Holanda, el tiempo era malo y siempre estaba nublado."
    en: "When I lived in the Netherlands, the weather was bad and it was always cloudy."

  - es: "La empresa fue fundada en 2020 y ahora está creciendo rápidamente."
    en: "The company was founded in 2020 and is now growing rapidly."

  - es: "Mi hermano es muy tranquilo, pero hoy está preocupado."
    en: "My brother is very calm, but today he is worried."

  - es: "Normalmente soy optimista, pero esta semana he estado estresado."
    en: "I am normally optimistic, but this week I have been stressed."